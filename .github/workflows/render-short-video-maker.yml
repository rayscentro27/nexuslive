name: Render Short Video Maker (artifact only)

# Manual only. Runs the official Short Video Maker (MIT) Docker image on a Linux runner with
# the free PEXELS_API_KEY secret, renders one short from a Nexus request JSON, uploads the MP4
# as an ARTIFACT. NO YouTube, NO posting, NO scheduling. Kokoro TTS + Whisper captions + Pexels b-roll.

on:
  workflow_dispatch:
    inputs:
      request_file:
        description: "Nexus SVM request JSON (in repo)"
        required: false
        default: "ci/svm-requests/fcf087ea.json"
      output_name:
        description: "Output MP4 filename"
        required: false
        default: "fcf087ea_business_credit_myths_v5_short_video_maker.mp4"

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout (for request JSON)
        uses: actions/checkout@v4

      - name: Guard — Pexels secret present
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          if [ -z "$PEXELS_API_KEY" ]; then echo "PEXELS_API_KEY secret missing"; exit 1; fi
          echo "Pexels key present (value hidden)."

      - name: Start Short Video Maker (Docker)
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          docker run -d --name svm -p 3123:3123 \
            -e PEXELS_API_KEY="$PEXELS_API_KEY" \
            -e LOG_LEVEL=info \
            gyoridavid/short-video-maker:latest-tiny
          echo "waiting for /health ..."
          for i in $(seq 1 90); do
            if curl -fsS "http://localhost:3123/health" >/dev/null 2>&1; then echo "server up"; break; fi
            sleep 5
          done

      - name: Render one short
        run: |
          REQ="${{ github.workspace }}/${{ github.event.inputs.request_file }}"
          echo "POSTing: $REQ"
          VID=$(curl -fsS -X POST "http://localhost:3123/api/short-video" -H "Content-Type: application/json" --data @"$REQ" | python3 -c "import sys,json;print(json.load(sys.stdin).get('videoId',''))")
          echo "videoId=$VID"
          if [ -z "$VID" ]; then echo "no videoId"; docker logs svm | tail -60; exit 1; fi
          for i in $(seq 1 150); do
            ST=$(curl -fsS "http://localhost:3123/api/short-video/$VID/status" | python3 -c "import sys,json;print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            echo "  status=$ST"
            [ "$ST" = "ready" ] && break
            [ "$ST" = "failed" ] && { echo "render failed"; docker logs svm | tail -80; exit 1; }
            sleep 10
          done
          mkdir -p out
          curl -fsS "http://localhost:3123/api/short-video/$VID" -o "out/${{ github.event.inputs.output_name }}"
          docker logs svm | tail -20
          docker rm -f svm || true
          ls -la out/

      - name: Verify output
        run: test -s "out/${{ github.event.inputs.output_name }}" || (echo "no output mp4" && exit 1)

      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-svm-short-fcf087ea
          path: out/${{ github.event.inputs.output_name }}
          retention-days: 14
          if-no-files-found: error
